apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ollama-models
  namespace: ollama
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: local-path
  resources:
    requests:
      storage: 30Gi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  namespace: ollama
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ollama
  template:
    metadata:
      labels:
        app: ollama
    spec:
      initContainers:
        - name: pull-models
          image: ollama/ollama:latest
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -e
              echo "[init] Starting ollama server..."
              ollama serve &
              OLLAMA_PID=$!
              echo "[init] Waiting for ollama API to become ready (pid=$OLLAMA_PID)..."
              until ollama list > /dev/null 2>&1; do
                echo "[init] Not ready yet, retrying in 2s..."
                sleep 2
              done
              echo "[init] Ollama API is ready."
              echo "[init] Pulling qwen2.5-coder:3b..."
              ollama pull qwen2.5-coder:3b
              echo "[init] Pulling deepseek-r1:8b..."
              ollama pull deepseek-r1:8b
              echo "[init] Pulling qwen2.5vl:3b..."
              ollama pull qwen2.5vl:3b
              echo "[init] All models pulled successfully."
          env:
            - name: HSA_OVERRIDE_GFX_VERSION
              value: "10.3.0"
            - name: OLLAMA_DEBUG
              value: "1"
            - name: ROCR_VISIBLE_DEVICES
              value: ""
            - name: HIP_VISIBLE_DEVICES
              value: ""
            - name: CUDA_VISIBLE_DEVICES
              value: ""
          resources:
            requests:
              cpu: "500m"
              memory: 2Gi
            limits:
              cpu: "2"
              memory: 4Gi
          volumeMounts:
            - name: models
              mountPath: /root/.ollama
      containers:
        - name: ollama
          image: ollama/ollama:latest
          command: ["ollama", "serve"]
          env:
            - name: HSA_OVERRIDE_GFX_VERSION
              value: "10.3.0"
            - name: OLLAMA_KEEP_ALIVE
              value: "5m"
            - name: OLLAMA_MAX_LOADED_MODELS
              value: "1"
            - name: OLLAMA_NUM_PARALLEL
              value: "1"
          ports:
            - containerPort: 11434
          resources:
            requests:
              cpu: "1"
              memory: 4Gi
            limits:
              cpu: "4"
              memory: 12Gi
              amd.com/gpu: "1"
          volumeMounts:
            - name: models
              mountPath: /root/.ollama
          readinessProbe:
            httpGet:
              path: /api/tags
              port: 11434
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /api/tags
              port: 11434
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
      volumes:
        - name: models
          persistentVolumeClaim:
            claimName: ollama-models

---
apiVersion: v1
kind: Service
metadata:
  name: ollama
  namespace: ollama
spec:
  selector:
    app: ollama
  ports:
    - port: 11434
      targetPort: 11434

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ollama
  namespace: ollama
  annotations:
    cert-manager.io/cluster-issuer: cerberus-ca
spec:
  rules:
    - host: ollama.hallm.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ollama
                port:
                  number: 11434
  tls:
    - hosts:
        - ollama.hallm.local
      secretName: ollama-tls
