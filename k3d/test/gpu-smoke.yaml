apiVersion: v1
kind: Pod
metadata:
  name: hallm-gpu-smoke
  namespace: default
spec:
  restartPolicy: Never
  containers:
    - name: smoke
      image: busybox
      command: ["sh", "-c", "echo GPU_OK"]
      resources:
        limits:
          amd.com/gpu: "1"
      env:
        - name: HSA_OVERRIDE_GFX_VERSION
          value: "10.3.0"
