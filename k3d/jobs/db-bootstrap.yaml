apiVersion: batch/v1
kind: Job
metadata:
  name: db-bootstrap
  namespace: default
spec:
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: db-bootstrap
          image: postgres:17-alpine
          env:
            - name: PGHOST
              value: postgres
            - name: PGPORT
              value: "5432"
            - name: PGUSER
              valueFrom:
                secretKeyRef:
                  name: hallm-env
                  key: POSTGRES_USER
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: hallm-env
                  key: POSTGRES_PASSWORD
            - name: PGDATABASE
              valueFrom:
                secretKeyRef:
                  name: hallm-env
                  key: POSTGRES_DB
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -e

              until pg_isready -h "$PGHOST" -U "$PGUSER"; do
                echo "Waiting for postgres..."; sleep 2
              done

              echo "==> Bootstrap complete."
