apiVersion: batch/v1
kind: Job
metadata:
  name: db-bootstrap
  namespace: default
spec:
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: db-bootstrap
          image: postgres:17-alpine
          env:
            - name: PGHOST
              value: postgres
            - name: PGPORT
              value: "5432"
            - name: PGUSER
              valueFrom:
                secretKeyRef:
                  name: hallm-env
                  key: POSTGRES_USER
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: hallm-env
                  key: POSTGRES_PASSWORD
            - name: PGDATABASE
              valueFrom:
                secretKeyRef:
                  name: hallm-env
                  key: POSTGRES_DB
            - name: LITELLM_USER
              valueFrom:
                secretKeyRef:
                  name: hallm-env
                  key: LITELLM_USER
            - name: LITELLM_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: hallm-env
                  key: LITELLM_PASSWORD
            - name: LITELLM_DB
              valueFrom:
                secretKeyRef:
                  name: hallm-env
                  key: LITELLM_DB
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -e

              until pg_isready -h "$PGHOST" -U "$PGUSER"; do
                echo "Waiting for postgres..."; sleep 2
              done

              echo "==> Creating role ${LITELLM_USER}..."
              psql -c "SELECT 1 FROM pg_catalog.pg_roles WHERE rolname = '${LITELLM_USER}'" \
                | grep -q 1 \
                && echo "Role already exists, skipping." \
                || psql -c "CREATE ROLE \"${LITELLM_USER}\" WITH LOGIN PASSWORD '${LITELLM_PASSWORD}'"

              echo "==> Creating database ${LITELLM_DB}..."
              psql -c "SELECT 1 FROM pg_database WHERE datname = '${LITELLM_DB}'" \
                | grep -q 1 \
                && echo "Database already exists, skipping." \
                || psql -c "CREATE DATABASE \"${LITELLM_DB}\" OWNER \"${LITELLM_USER}\""

              echo "==> Granting privileges..."
              psql -c "GRANT ALL PRIVILEGES ON DATABASE \"${LITELLM_DB}\" TO \"${LITELLM_USER}\""

              echo "==> Bootstrap complete."
