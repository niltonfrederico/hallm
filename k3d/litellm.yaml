apiVersion: apps/v1
kind: Deployment
metadata:
  name: litellm
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: litellm
  template:
    metadata:
      labels:
        app: litellm
    spec:
      containers:
        - name: litellm
          image: ghcr.io/berriai/litellm:main-latest
          args: ["--config", "/app/config.yaml", "--port", "4000"]
          envFrom:
            - secretRef:
                name: hallm-env
          ports:
            - containerPort: 4000
          resources:
            requests:
              cpu: "250m"
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 3Gi
          volumeMounts:
            - name: config
              mountPath: /app/config.yaml
              subPath: config.yaml
          readinessProbe:
            httpGet:
              path: /health/liveliness
              port: 4000
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 9
          livenessProbe:
            httpGet:
              path: /health/liveliness
              port: 4000
            initialDelaySeconds: 60
            periodSeconds: 30
            failureThreshold: 3
      volumes:
        - name: config
          configMap:
            name: litellm-config

---
apiVersion: v1
kind: Service
metadata:
  name: litellm
  namespace: default
spec:
  selector:
    app: litellm
  ports:
    - port: 4000
      targetPort: 4000

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: litellm
  namespace: default
  annotations:
    cert-manager.io/cluster-issuer: cerberus-ca
spec:
  rules:
    - host: litellm.hallm.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: litellm
                port:
                  number: 4000
  tls:
    - hosts:
        - litellm.hallm.local
      secretName: litellm-tls

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: litellm-config
  namespace: default
data:
  config.yaml: |
    model_list:
      # ── Individual Models ─────────────────────────────────────
      - model_name: gemini-flash
        litellm_params:
          model: gemini/gemini-2.5-flash
          api_key: os.environ/GEMINI_API_KEY

      - model_name: gemini-pro
        litellm_params:
          model: gemini/gemini-2.5-pro
          api_key: os.environ/GEMINI_API_KEY

      - model_name: claude-sonnet
        litellm_params:
          model: anthropic/claude-sonnet-4-6
          api_key: os.environ/ANTHROPIC_API_KEY

      - model_name: claude-opus
        litellm_params:
          model: anthropic/claude-opus-4-7
          api_key: os.environ/ANTHROPIC_API_KEY

      - model_name: claude-haiku
        litellm_params:
          model: anthropic/claude-haiku-4-5-20251001
          api_key: os.environ/ANTHROPIC_API_KEY

      - model_name: qwen-coder
        litellm_params:
          model: ollama_chat/qwen2.5-coder:3b
          api_base: http://ollama.hallm.local

      - model_name: deepseek-r1
        litellm_params:
          model: ollama_chat/deepseek-r1:8b
          api_base: http://ollama.hallm.local

      - model_name: local-vlm-fallback
        litellm_params:
          model: ollama_chat/qwen2.5-vl:3b
          api_base: http://ollama.hallm.local

      # ── Routing Groups ────────────────────────────────────────
      - model_name: autocomplete
        litellm_params:
          model: ollama_chat/qwen2.5-coder:3b
          api_base: http://ollama.hallm.local

      - model_name: reasoning
        litellm_params:
          model: ollama_chat/deepseek-r1:8b
          api_base: http://ollama.hallm.local

      - model_name: agentic
        litellm_params:
          model: anthropic/claude-sonnet-4-6
          api_key: os.environ/ANTHROPIC_API_KEY

      - model_name: utility-text
        litellm_params:
          model: gemini/gemini-2.5-flash
          api_key: os.environ/GEMINI_API_KEY

      - model_name: utility-text
        litellm_params:
          model: anthropic/claude-haiku-4-5-20251001
          api_key: os.environ/ANTHROPIC_API_KEY

      - model_name: ocr
        litellm_params:
          model: gemini/gemini-2.5-flash
          api_key: os.environ/GEMINI_API_KEY

    router_settings:
      routing_strategy: least-busy
      num_retries: 2
      allowed_fails: 1
      fallbacks:
        - {"agentic":      ["gemini-pro", "claude-opus", "deepseek-r1"]}
        - {"utility-text": ["qwen-coder"]}
        - {"ocr":          ["local-vlm-fallback"]}

    general_settings:
      master_key: os.environ/LITELLM_MASTER_KEY
      default_model: gemini-flash
      model_aliases:
        "claude-sonnet-4-6": "claude-sonnet"
        "claude-opus-4-7": "claude-opus"
        "claude-haiku-4-5-20251001": "claude-haiku"
      database_url: os.environ/LITELLM_DATABASE_URL
