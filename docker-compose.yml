services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-hallm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hallm}
      POSTGRES_DB: ${POSTGRES_DB:-hallm}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-hallm} -d ${POSTGRES_DB:-hallm}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-hallm}:${POSTGRES_PASSWORD:-hallm}@db:5432/${POSTGRES_DB:-hallm}
    ports:
      - "${APP_PORT:-8000}:8000"
    volumes:
      - ./hallm:/app/hallm
      - ./tests:/app/tests

  tests:
    build:
      context: .
      dockerfile: docker/Dockerfile.test
    environment:
      DATABASE_URL: "sqlite://:memory:"
    command: [ "pytest", "-m", "not integration" ]
    profiles: [ "test" ]
    volumes:
      - ./hallm:/app/hallm
      - ./tests:/app/tests

  integration-tests:
    build:
      context: .
      dockerfile: docker/Dockerfile.test
    env_file: .env
    environment:
      DATABASE_URL: "sqlite://:memory:"
      LLM_TIMEOUT: "30"
    command: [ "pytest", "-m", "integration" ]
    profiles: [ "test" ]
    volumes:
      - ./hallm:/app/hallm
      - ./tests:/app/tests

  lint:
    build:
      context: .
      dockerfile: docker/Dockerfile.test
    command: [ "pre-commit", "run", "--all-files" ]
    profiles: [ "lint" ]
    volumes:
      - ./.git:/app/.git
      - ./.pre-commit-config.yaml:/app/.pre-commit-config.yaml
      - ./pyproject.toml:/app/pyproject.toml
      - ./hallm:/app/hallm
      - ./tests:/app/tests

  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    restart: unless-stopped
    ports:
      - "${LITELLM_PORT:-4000}:4000"
    volumes:
      - ./litellm/config.yaml:/app/config.yaml:ro
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    environment:
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      GITHUB_COPILOT_API_KEY: ${GITHUB_COPILOT_API_KEY}
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:-sk-hallm}
    command: [ "--config", "/app/config.yaml", "--port", "4000" ]

volumes:
  postgres_data:
