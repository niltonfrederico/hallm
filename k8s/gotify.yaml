apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: gotify-data
  namespace: default
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: local-path
  resources:
    requests:
      storage: 1Gi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gotify
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gotify
  template:
    metadata:
      labels:
        app: gotify
    spec:
      containers:
        - name: gotify
          image: gotify/server:latest
          env:
            - name: GOTIFY_SERVER_PORT
              value: "80"
            - name: GOTIFY_DATABASE_DIALECT
              value: "sqlite3"
            - name: GOTIFY_DATABASE_CONNECTION
              value: "/app/data/gotify.db"
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "100m"
              memory: 64Mi
            limits:
              cpu: "500m"
              memory: 256Mi
          volumeMounts:
            - name: data
              mountPath: /app/data
          readinessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: gotify-data

---
apiVersion: v1
kind: Service
metadata:
  name: gotify
  namespace: default
spec:
  selector:
    app: gotify
  ports:
    - port: 80
      targetPort: 80

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: gotify
  namespace: default
  annotations:
    cert-manager.io/cluster-issuer: cerberus-ca
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
spec:
  tls:
    - hosts: [gotify.hallm.local]
      secretName: gotify-tls
  rules:
    - host: gotify.hallm.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: gotify
                port:
                  number: 80
