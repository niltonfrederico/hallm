apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: valkey-data
  namespace: default
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: local-path
  resources:
    requests:
      storage: 5Gi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: valkey
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: valkey
  template:
    metadata:
      labels:
        app: valkey
    spec:
      containers:
        - name: valkey
          image: valkey/valkey:8-alpine
          args:
            - valkey-server
            - --appendonly
            - "yes"
            - --requirepass
            - $(VALKEY_PASSWORD)
          env:
            - name: VALKEY_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: hallm-env
                  key: VALKEY_PASSWORD
          ports:
            - containerPort: 6379
          resources:
            requests:
              cpu: "100m"
              memory: 128Mi
            limits:
              cpu: "500m"
              memory: 512Mi
          volumeMounts:
            - name: data
              mountPath: /data
          readinessProbe:
            exec:
              command: ["sh", "-c", "valkey-cli -a $VALKEY_PASSWORD PING"]
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 6
          livenessProbe:
            exec:
              command: ["sh", "-c", "valkey-cli -a $VALKEY_PASSWORD PING"]
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: valkey-data

---
apiVersion: v1
kind: Service
metadata:
  name: valkey
  namespace: default
spec:
  selector:
    app: valkey
  ports:
    - port: 6379
      targetPort: 6379
