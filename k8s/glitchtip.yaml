apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: glitchtip-uploads
  namespace: default
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: local-path
  resources:
    requests:
      storage: 5Gi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: glitchtip-web
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: glitchtip
      component: web
  template:
    metadata:
      labels:
        app: glitchtip
        component: web
    spec:
      containers:
        - name: web
          image: glitchtip/glitchtip:latest
          env:
            - name: DATABASE_URL
              value: "postgres://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@postgres.default.svc.cluster.local:5432/glitchtip"
            - name: REDIS_URL
              value: "redis://:$(VALKEY_PASSWORD)@valkey.default.svc.cluster.local:6379/1"
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: hallm-env
                  key: GLITCHTIP_SECRET_KEY
            - name: GLITCHTIP_DOMAIN
              value: "https://glitchtip.hallm.local"
            - name: PORT
              value: "8000"
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: hallm-env
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: hallm-env
                  key: POSTGRES_PASSWORD
            - name: VALKEY_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: hallm-env
                  key: VALKEY_PASSWORD
          ports:
            - containerPort: 8000
          resources:
            requests:
              cpu: "200m"
              memory: 384Mi
            limits:
              cpu: "1"
              memory: 1Gi
          volumeMounts:
            - name: uploads
              mountPath: /code/uploads
          readinessProbe:
            httpGet:
              path: /api/0/
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 12
      volumes:
        - name: uploads
          persistentVolumeClaim:
            claimName: glitchtip-uploads

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: glitchtip-worker
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: glitchtip
      component: worker
  template:
    metadata:
      labels:
        app: glitchtip
        component: worker
    spec:
      containers:
        - name: worker
          image: glitchtip/glitchtip:latest
          command: ["./bin/run-celery-with-beat.sh"]
          env:
            - name: DATABASE_URL
              value: "postgres://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@postgres.default.svc.cluster.local:5432/glitchtip"
            - name: REDIS_URL
              value: "redis://:$(VALKEY_PASSWORD)@valkey.default.svc.cluster.local:6379/1"
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: hallm-env
                  key: GLITCHTIP_SECRET_KEY
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: hallm-env
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: hallm-env
                  key: POSTGRES_PASSWORD
            - name: VALKEY_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: hallm-env
                  key: VALKEY_PASSWORD
          resources:
            requests:
              cpu: "100m"
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          volumeMounts:
            - name: uploads
              mountPath: /code/uploads
      volumes:
        - name: uploads
          persistentVolumeClaim:
            claimName: glitchtip-uploads

---
apiVersion: v1
kind: Service
metadata:
  name: glitchtip
  namespace: default
spec:
  selector:
    app: glitchtip
    component: web
  ports:
    - port: 80
      targetPort: 8000

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: glitchtip
  namespace: default
  annotations:
    cert-manager.io/cluster-issuer: cerberus-ca
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
spec:
  tls:
    - hosts: [glitchtip.hallm.local]
      secretName: glitchtip-tls
  rules:
    - host: glitchtip.hallm.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: glitchtip
                port:
                  number: 80
