apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: activitywatch-data
  namespace: default
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: local-path
  resources:
    requests:
      storage: 1Gi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: activitywatch
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: activitywatch
  template:
    metadata:
      labels:
        app: activitywatch
    spec:
      containers:
        - name: aw-server
          image: unregistry.hallm.local/hallm/activitywatch:latest
          imagePullPolicy: IfNotPresent
          args:
            - --host
            - "0.0.0.0"
            - --port
            - "5600"
          env:
            - name: AW_HOST
              valueFrom:
                secretKeyRef:
                  name: hallm-env
                  key: AW_HOST
            - name: AW_PORT
              valueFrom:
                secretKeyRef:
                  name: hallm-env
                  key: AW_PORT
          ports:
            - containerPort: 5600
          resources:
            requests:
              cpu: "100m"
              memory: 128Mi
            limits:
              cpu: "500m"
              memory: 512Mi
          volumeMounts:
            - name: data
              mountPath: /root/.local/share/activitywatch
          readinessProbe:
            httpGet:
              path: /api/0/info
              port: 5600
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 6
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: activitywatch-data

---
apiVersion: v1
kind: Service
metadata:
  name: activitywatch
  namespace: default
spec:
  selector:
    app: activitywatch
  ports:
    - port: 80
      targetPort: 5600

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: activitywatch
  namespace: default
  annotations:
    cert-manager.io/cluster-issuer: cerberus-ca
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
spec:
  tls:
    - hosts: [aw.hallm.local]
      secretName: activitywatch-tls
  rules:
    - host: aw.hallm.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: activitywatch
                port:
                  number: 80
